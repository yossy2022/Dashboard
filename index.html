<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タスク管理アプリ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>タスク管理アプリ</h1>
      <p>チケットを作成して、ドラッグ&amp;ドロップでステータスを移動できます。</p>
    </header>

    <section class="task-form-section">
      <form id="task-form">
        <div class="form-row">
          <label for="task-title">タイトル</label>
          <input id="task-title" type="text" placeholder="タイトルを入力" required />
        </div>
        <div class="form-row">
          <label for="task-content">内容</label>
          <textarea id="task-content" placeholder="内容を入力" required></textarea>
        </div>
        <div class="form-row">
          <label for="task-status">ステータス</label>
          <select id="task-status">
            <option value="todo">ToDo</option>
            <option value="inprogress">Inprogress</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div class="form-row">
          <label for="task-url">参照URL（オプション）</label>
          <input id="task-url" type="url" placeholder="https://example.com" />
        </div>
        <button type="submit">チケットを作成</button>
      </form>
    </section>

    <section class="board-section">
      <div class="column" data-status="todo">
        <h2>ToDo</h2>
        <div class="column-dropzone" id="todo-column"></div>
      </div>
      <div class="column" data-status="inprogress">
        <h2>Inprogress</h2>
        <div class="column-dropzone" id="inprogress-column"></div>
      </div>
      <div class="column" data-status="done">
        <h2>Done</h2>
        <div class="column-dropzone" id="done-column"></div>
      </div>
    </section>
  </div>

  <div id="edit-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>チケット編集</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <form id="edit-form">
        <div class="form-row">
          <label for="edit-title">タイトル</label>
          <input id="edit-title" type="text" required />
        </div>
        <div class="form-row">
          <label for="edit-content">内容</label>
          <textarea id="edit-content" required></textarea>
        </div>
        <div class="form-row">
          <label for="edit-status">ステータス</label>
          <select id="edit-status">
            <option value="todo">ToDo</option>
            <option value="inprogress">Inprogress</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div class="form-row">
          <label for="edit-url">参照URL</label>
          <input id="edit-url" type="url" />
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary" id="edit-delete">削除</button>
          <div class="modal-actions">
            <button type="button" class="btn-secondary" id="edit-cancel">キャンセル</button>
            <button type="submit" class="btn-primary">保存</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
